<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5B3MKR8P6H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-5B3MKR8P6H', {
        'page_title': 'Visual Narrative Archive',
        'send_page_view': true,
        'cookie_flags': 'SameSite=None;Secure'
      });
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive - Visual Narrative</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fcfcfc;
            font-family: 'Cormorant Garamond', serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .vertical-text { writing-mode: vertical-rl; }
        .no-clip { overflow: visible !important; white-space: nowrap; }
        #gallery-container::-webkit-scrollbar { width: 4px; }
        #gallery-container::-webkit-scrollbar-track { background: transparent; }
        #gallery-container::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }

	img {
        image-rendering: -webkit-optimize-contrast; /* 뭉개짐 방지 */
        transform: translateZ(0);
        backface-visibility: hidden;
        width: 100%;
        height: 100%;
        object-fit: contain; /* 잘림 방지 (전체 출력) */
        background-color: #fcfcfc;
        display: block;
    }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('menu');
            const [activeCategory, setActiveCategory] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false);

            const GITHUB_USER = "liscf4";
            const REPO_NAME = "my-portfolio-images";
            const BRANCH = "main";

            useEffect(() => {
                setIsLoaded(true);

                // Handle browser back button
                const handlePopState = (event) => {
                    if (event.state && event.state.view) {
                        setView(event.state.view);
                        setActiveCategory(event.state.category || null);
                    } else {
                        setView('menu');
                        setActiveCategory(null);
                    }
                };

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const generateUrls = (category, count) => {
                return Array.from({ length: count }, (_, i) => 
                    `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/${BRANCH}/${category}/${i + 1}.jpg`
                );
            };

            const galleryData = {
                people: generateUrls('people', 45),
                sunset: generateUrls('sunset', 45),
                beach: generateUrls('beach', 45),
                climbing: generateUrls('climbing', 45),
            };

            const categories = [
                { id: 'people', label: 'People' },
                { id: 'sunset', label: 'Sunset' },
                { id: 'beach', label: 'Beach' },
                { id: 'climbing', label: 'Climbing' },
            ];

            const handleOpenCategory = (id) => {
                setActiveCategory(id);
                setView('gallery');
                
                // Push state to browser history for back button support
                window.history.pushState({ view: 'gallery', category: id }, '');

                if (typeof gtag === 'function') {
                    gtag('event', 'view_category', { 'category_id': id });
                }
            };

            const handleCloseView = () => {
                if (window.history.state) {
                    window.history.back();
                } else {
                    setView('menu');
                    setActiveCategory(null);
                }
            };

            const openContact = () => {
                setView('contact');
                window.history.pushState({ view: 'contact' }, '');
            };

            return (
                <div className="flex flex-col h-screen w-full bg-[#fcfcfc] text-zinc-900 overflow-hidden selection:bg-zinc-100">
                    
                    <div className="fixed top-10 left-10 right-10 flex justify-between items-start z-[60] pointer-events-none">
                        <div className="flex flex-col gap-0 pointer-events-auto cursor-pointer" onClick={handleCloseView}>
                            <h1 className="text-[15px] tracking-tight font-medium text-zinc-900 leading-none no-clip">Archive</h1>
                        </div>
                        <button 
                            onClick={openContact}
                            className="text-[14px] tracking-tight font-medium text-zinc-400 hover:text-zinc-900 transition-all pointer-events-auto no-clip"
                        >
                            Contact
                        </button>
                    </div>

                    <main className={`flex-1 flex flex-col justify-center px-12 md:px-24 relative transition-all duration-1000 ease-out ${isLoaded ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                        <div className="flex flex-col items-start space-y-2 md:space-y-3 max-w-full">
                            {categories.map((cat) => (
                                <button
                                    key={cat.id}
                                    onClick={() => handleOpenCategory(cat.id)}
                                    className="group relative flex items-center py-1 no-clip pr-24 text-left"
                                >
                                    <span className="text-5xl md:text-8xl font-normal tracking-tightest text-zinc-800 group-hover:italic group-hover:translate-x-6 transition-all duration-700 ease-in-out inline-block">
                                        {cat.label}
                                    </span>
                                </button>
                            ))}
                        </div>
                    </main>

                    {view === 'gallery' && activeCategory && (
                        <div className="fixed inset-0 bg-white z-[100] flex flex-col animate-in fade-in duration-700 overflow-hidden text-zinc-900">
                            <div className="flex items-center justify-between px-10 py-6 shrink-0 border-b border-zinc-50">
                                <div className="flex flex-col gap-0 no-clip">
                                    <span className="text-[9px] tracking-tight uppercase text-zinc-300 italic font-normal leading-none mb-1">Collection</span>
                                    <span className="text-2xl font-medium italic tracking-tighter uppercase leading-none">{activeCategory}</span>
                                </div>
                                <button onClick={handleCloseView} className="group p-2">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" className="group-hover:rotate-90 transition-transform duration-500">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>

                            <div id="gallery-container" className="flex-1 overflow-y-auto px-1 pb-40 scroll-smooth">
                                <div className="flex flex-col gap-1">
                                    {galleryData[activeCategory] && galleryData[activeCategory].length > 0 ? (
                                        galleryData[activeCategory].map((url, i) => (
                <div key={i} className="relative w-full h-auto py-4 px-8 flex justify-center items-center bg-[#fcfcfc]">
                    <img 
                        src={url} 
                        alt="" 
                        className="w-full h-auto max-h-[90vh] object-contain block transition-transform duration-[2000ms] hover:scale-[1.01]"
                        loading="lazy" 
                        onError={(e) => { e.target.parentElement.style.display = 'none'; }}
                    />
                </div>
            ))
) : (
    <div className="h-64 flex items-center justify-center text-zinc-200 italic">No images in this folder.</div>
)}
                                    ) : (
                                        <div className="h-64 flex items-center justify-center text-zinc-200 italic">No images in this folder.</div>
                                    )}
                                </div>
                                <button onClick={() => document.getElementById('gallery-container').scrollTo({top:0, behavior:'smooth'})} className="mt-24 w-full flex flex-col items-center gap-4 group">
                                    <div className="w-[1px] h-12 bg-zinc-100 group-hover:h-20 transition-all duration-700"></div>
                                    <span className="text-[10px] tracking-tight uppercase text-zinc-300 italic font-normal no-clip">Return to Top</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'contact' && (
                        <div className="fixed inset-0 bg-white text-zinc-900 z-[150] flex flex-col animate-in slide-in-from-bottom duration-1000 ease-in-out">
                            <div className="flex justify-end p-10">
                                <button onClick={handleCloseView} className="p-2 group">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" className="group-hover:scale-110 transition-transform">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </button>
                            </div>
                            
                            <div className="flex-1 flex flex-col justify-center px-12 md:px-24 text-zinc-900">
                                <div className="flex flex-col items-start space-y-12 max-w-full">
                                    <div className="space-y-4 w-full pr-20">
                                        <p className="text-[12px] uppercase tracking-tight text-zinc-500 italic font-normal no-clip">Connect</p>
                                        <div className="flex items-center gap-8 mt-2">
                                            <a href="https://www.instagram.com/noislandnolife/" target="_blank" className="text-zinc-900 hover:opacity-50 transition-opacity">
                                                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                                                </svg>
                                            </a>
                                            <a href="https://open.kakao.com/o/s0p3RXki" target="_blank" className="text-zinc-900 hover:opacity-50 transition-opacity">
                                                <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
                                                    <path d="M12 3c-4.97 0-9 3.11-9 6.93 0 2.43 1.64 4.57 4.14 5.83l-1.05 3.86c-.05.18.06.37.23.42.06.02.12.02.18 0l4.51-2.99c.64.08 1.3.12 1.99.12 4.97 0 9-3.11 9-6.93S16.97 3 12 3z"/>
                                                </svg>
                                            </a>
                                        </div>
                                    </div>
                                    <div className="space-y-4 w-full pr-20">
                                        <p className="text-[12px] uppercase tracking-tight text-zinc-500 italic font-normal no-clip">Inquiry</p>
                                        <a href="mailto:wjlk7887@gmail.com" className="block text-xl md:text-3xl font-medium tracking-tight hover:italic transition-all duration-500 ease-in-out no-clip">wjlk7887@gmail.com</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
